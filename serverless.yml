# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: codebr
service: aws-lambda-queue-consumer

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 128
  timeout: 10
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sqs:ReceiveMessage
        - sqs:DeleteMessage
        - sqs:GetQueueAttributes
      Resource: arn:aws:sqs:us-east-1:900075695523:ezzepay-webhooks.fifo

functions:
  consumer:
    handler: dist/handler.handler
    events:
      - sqs:
          arn: arn:aws:sqs:us-east-1:900075695523:ezzepay-webhooks.fifo
          batchSize: 10

package:
  exclude:
    - node_modules/**
    - src/**
    - .git/**
    - .vscode/**
